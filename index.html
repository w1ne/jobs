<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Exposure of the European Job Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --fg: #e0e0e8;
      --fg2: #888894;
      --brand: #6366f1;
      --sidebar-w: 260px;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      padding: 24px 20px;
      z-index: 10;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    #sidebar h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    #sidebar .subtitle {
      font-size: 11px;
      color: var(--fg2);
      margin-top: 6px;
      line-height: 1.5;
    }

    #sidebar .subtitle a {
      color: var(--fg2);
      text-decoration: underline;
    }

    .search-container {
      position: relative;
    }

    input#search {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 10px 12px;
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }

    input#search:focus {
      border-color: var(--brand);
      background: rgba(255, 255, 255, 0.06);
    }

    .stat-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-section h3 {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--fg2);
    }

    .stat-big {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--fg2);
    }

    .tier-bar {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .tier-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }

    .tier-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .tier-name {
      flex: 1;
      color: var(--fg2);
    }

    .tier-pct {
      text-align: right;
      width: 32px;
      color: var(--fg);
      font-weight: 500;
    }

    .histogram {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 60px;
      background: rgba(255, 255, 255, 0.02);
      padding: 4px;
      border-radius: 4px;
    }

    .histogram .bar {
      flex: 1;
      border-radius: 1px 1px 0 0;
      min-height: 1px;
      transition: height 0.3s;
    }

    .hbar-chart {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .hbar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }

    .hbar-label {
      width: 85px;
      flex-shrink: 0;
      color: var(--fg2);
      font-size: 10px;
      text-align: right;
    }

    .hbar-track {
      flex: 1;
      height: 12px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 3px;
      overflow: hidden;
    }

    .hbar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease-out;
    }

    .hbar-val {
      width: 24px;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 500;
      text-align: right;
    }

    .view-toggle {
      display: flex;
      gap: 6px;
      background: rgba(255, 255, 255, 0.03);
      padding: 4px;
      border-radius: 8px;
    }

    .view-toggle button {
      flex: 1;
      padding: 6px 0;
      font-size: 11px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--fg2);
      cursor: pointer;
      transition: all 0.2s;
    }

    .view-toggle button.active {
      background: var(--bg);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    canvas#canvas {
      display: block;
      position: fixed;
      top: 0;
      left: var(--sidebar-w);
      cursor: default;
    }

    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #1a1a24;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 16px;
      font-size: 13px;
      width: 340px;
      opacity: 0;
      transition: opacity 0.1s, transform 0.1s;
      z-index: 100;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
    }

    #tooltip.visible {
      opacity: 1;
    }

    #tooltip .tt-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    #tooltip .tt-title {
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      line-height: 1.2;
      flex: 1;
      padding-right: 10px;
    }

    #tooltip .tt-cat {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--brand);
      font-weight: 700;
      margin-bottom: 4px;
    }

    #tooltip .tt-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tt-stat-box {
      background: rgba(255, 255, 255, 0.04);
      padding: 8px;
      border-radius: 6px;
    }

    .tt-stat-box .label {
      font-size: 10px;
      color: var(--fg2);
      margin-bottom: 2px;
    }

    .tt-stat-box .value {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    #tooltip .tt-rationale {
      font-size: 12px;
      color: var(--fg);
      line-height: 1.5;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 12px;
    }

    #prompt-btn {
      margin-top: auto;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--fg);
      font-size: 11px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    #prompt-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body>

  <div id="sidebar">
    <div>
      <h1>AI Exposure: European Job Market</h1>
      <div class="subtitle" id="occCount">Calculating...</div>
      <div class="subtitle">Data: <a href="https://ec.europa.eu/esco/">ESCO</a> + <a
          href="https://ec.europa.eu/eurostat/">Eurostat</a> &middot; scored by Gemini 2.0</div>
    </div>

    <div class="view-toggle">
      <button class="active" onclick="setView('treemap')">Treemap</button>
      <button onclick="setView('scatter')">Exposure vs Outlook</button>
    </div>

    <div class="search-container">
      <input type="text" id="search" placeholder="Search occupations..." oninput="handleSearch(this.value)">
    </div>

    <div class="stat-section">
      <h3>Weighted Avg. Exposure</h3>
      <div class="stat-big" id="statAvgExposure">—</div>
    </div>

    <div class="stat-section">
      <h3>Jobs by Exposure</h3>
      <div class="histogram" id="histogram"></div>
      <div class="hist-labels"
        style="display:flex;justify-content:space-between;font-size:9px;color:var(--fg2);margin-top:-2px;">
        <span>0</span><span>10</span></div>
    </div>

    <div class="stat-section">
      <h3>Breakdown</h3>
      <div class="tier-bar" id="tierBar"></div>
    </div>

    <div class="stat-section">
      <h3>By Education</h3>
      <div class="hbar-chart" id="eduChart"></div>
    </div>

    <div class="stat-section">
      <h3>By Median Pay</h3>
      <div class="hbar-chart" id="payChart"></div>
    </div>

    <div id="prompt-btn"
      onclick="alert('The scoring prompt follows Karpathy\'s methodology adapted for ESCO-08 hierarchy and European labor market context.')">
      View Evaluation Methodology
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <div id="tooltip">
    <div class="tt-cat"></div>
    <div class="tt-header">
      <div class="tt-title"></div>
    </div>
    <div class="tt-stats">
      <div class="tt-stat-box">
        <div class="label">Median Pay</div>
        <div class="value tt-pay"></div>
      </div>
      <div class="tt-stat-box">
        <div class="label">Total Jobs</div>
        <div class="value tt-jobs"></div>
      </div>
      <div class="tt-stat-box">
        <div class="label">AI Exposure</div>
        <div class="value tt-exp"></div>
      </div>
      <div class="tt-stat-box">
        <div class="label">Outlook</div>
        <div class="value tt-out"></div>
      </div>
    </div>
    <div class="tt-rationale"></div>
  </div>

  <script>

    // ── Colors ─────────────────────────────────────────────────────────────

    function exposureColor(score) {
      if (score == null) return [60, 60, 60];
      const t = Math.max(0, Math.min(10, score)) / 10;
      let r, g, b;
      if (t < 0.5) {
        const s = t / 0.5;
        r = 50 + s * 180; g = 160 - s * 10; b = 50 - s * 20;
      } else {
        const s = (t - 0.5) / 0.5;
        r = 230 + s * 25; g = 150 - s * 110; b = 30 - s * 10;
      }
      return [Math.round(r), Math.round(g), Math.round(b)];
    }

    function exposureColorCSS(score, alpha) {
      const [r, g, b] = exposureColor(score);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function outlookColorCSS(outlook, alpha) {
      if (outlook == null) return `rgba(128,128,128,${alpha})`;
      const t = Math.max(0, Math.min(1, (outlook + 12) / 24));
      let r, g, b;
      if (t < 0.5) {
        const s = t / 0.5;
        r = 220 - s * 40; g = 60 + s * 100; b = 50 - s * 20;
      } else {
        const s = (t - 0.5) / 0.5;
        r = 180 - s * 130; g = 160 + s * 10; b = 30 + s * 30;
      }
      return `rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},${alpha})`;
    }

    // ── Treemap Layout ─────────────────────────────────────────────────────

    function squarify(items, x, y, w, h) {
      if (items.length === 0) return [];
      if (items.length === 1) return [{ ...items[0], rx: x, ry: y, rw: w, rh: h }];

      const total = items.reduce((s, d) => s + d.value, 0);
      if (total === 0) return [];

      const results = [];
      let remaining = [...items], cx = x, cy = y, cw = w, ch = h;

      while (remaining.length > 0) {
        const remTotal = remaining.reduce((s, d) => s + d.value, 0);
        const vertical = cw >= ch, side = vertical ? ch : cw;
        let row = [remaining[0]], rowSum = remaining[0].value;

        for (let i = 1; i < remaining.length; i++) {
          const candidate = [...row, remaining[i]], candidateSum = rowSum + remaining[i].value;
          if (worstAspect(candidate, candidateSum, side, remTotal, vertical ? cw : ch) <
            worstAspect(row, rowSum, side, remTotal, vertical ? cw : ch)) {
            row = candidate; rowSum = candidateSum;
          } else break;
        }

        const rowFraction = rowSum / remTotal;
        const rowThickness = vertical ? cw * rowFraction : ch * rowFraction;
        let offset = 0;
        for (const item of row) {
          const itemLen = side * (item.value / rowSum);
          if (vertical) results.push({ ...item, rx: cx, ry: cy + offset, rw: rowThickness, rh: itemLen });
          else results.push({ ...item, rx: cx + offset, ry: cy, rw: itemLen, rh: rowThickness });
          offset += itemLen;
        }
        if (vertical) { cx += rowThickness; cw -= rowThickness; }
        else { cy += rowThickness; ch -= rowThickness; }
        remaining = remaining.slice(row.length);
      }
      return results;
    }

    function worstAspect(row, rowSum, side, totalArea, availExtent) {
      const rowExtent = availExtent * (rowSum / totalArea);
      if (rowExtent === 0) return Infinity;
      let worst = 0;
      for (const item of row) {
        const itemLen = side * (item.value / rowSum);
        const aspect = Math.max(rowExtent / itemLen, itemLen / rowExtent);
        if (aspect > worst) worst = aspect;
      }
      return worst;
    }

    // ── Core App ───────────────────────────────────────────────────────────

    let allData = [], rects = [], categoryRects = [], hovered = null, currentView = "treemap", searchQuery = "";
    const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
    let dpr = window.devicePixelRatio || 1;

    function setView(v) {
      currentView = v;
      document.querySelectorAll(".view-toggle button").forEach(b => b.classList.remove("active"));
      document.querySelector(`button[onclick="setView('${v}')"]`).classList.add("active");
      resize();
    }

    function handleSearch(q) {
      searchQuery = q.toLowerCase();
      draw(); // Only redraw for highlight
    }

    function layout() {
      const sidebarW = 260;
      const w = window.innerWidth - sidebarW, h = window.innerHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      canvas.style.width = w + "px"; canvas.style.height = h + "px";

      const M = 16, G = 2;
      const tx = M, ty = M, tw = w - M * 2, th = h - M * 2;

      const byCat = {};
      for (const d of allData) {
        if (!byCat[d.category]) byCat[d.category] = [];
        byCat[d.category].push(d);
      }

      const categories = Object.keys(byCat).map(cat => ({
        cat, items: byCat[cat].sort((a, b) => (b.jobs || 0) - (a.jobs || 0)),
        value: byCat[cat].reduce((s, d) => s + (d.jobs || 1), 0)
      })).sort((a, b) => b.value - a.value);

      categoryRects = squarify(categories, tx, ty, tw, th);
      rects = [];
      for (const cr of categoryRects) {
        const items = cr.items.map(d => ({ ...d, value: d.jobs || 1 }));
        const inner = squarify(items, cr.rx + G, cr.ry + G, cr.rw - G * 2, cr.rh - G * 2);
        for (const ir of inner) rects.push(ir);
      }
    }

    function draw() {
      const w = canvas.width / dpr, h = canvas.height / dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.fillStyle = "#0a0a0f"; ctx.fillRect(0, 0, w, h);

      for (const r of rects) {
        const isHovered = r === hovered;
        const isMatch = searchQuery && r.title.toLowerCase().includes(searchQuery);
        const alpha = isHovered ? 1.0 : (searchQuery ? (isMatch ? 0.9 : 0.1) : 0.6);

        ctx.fillStyle = exposureColorCSS(r.exposure, alpha);
        ctx.fillRect(r.rx + 0.5, r.ry + 0.5, r.rw - 1, r.rh - 1);

        if (isHovered) {
          ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
          ctx.strokeRect(r.rx + 1, r.ry + 1, r.rw - 2, r.rh - 2);
        } else if (isMatch) {
          ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1;
          ctx.strokeRect(r.rx, r.ry, r.rw, r.rh);
        }
      }

      // category labels
      ctx.fillStyle = "rgba(255,255,255,0.15)";
      ctx.font = "bold 24px Inter"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      for (const cr of categoryRects) {
        if (cr.rw > 150 && cr.rh > 80) {
          ctx.save(); ctx.beginPath(); ctx.rect(cr.rx, cr.ry, cr.rw, cr.rh); ctx.clip();
          ctx.fillText(cr.cat, cr.rx + cr.rw / 2, cr.ry + cr.rh / 2);
          ctx.restore();
        }
      }

      // Item labels (if zoomed/large enough)
      for (const r of rects) {
        if (r.rw > 60 && r.rh > 24) {
          ctx.save(); ctx.beginPath(); ctx.rect(r.rx + 4, r.ry + 2, r.rw - 8, r.rh - 4); ctx.clip();
          const fs = Math.min(13, Math.max(9, Math.min(r.rw / 10, r.rh / 3)));
          ctx.font = `500 ${fs}px Inter`; ctx.fillStyle = "rgba(255,255,255,0.9)";
          ctx.textAlign = "left"; ctx.textBaseline = "top";
          ctx.fillText(r.title, r.rx + 6, r.ry + 4);
          ctx.restore();
        }
      }
    }

    // ... Additional scatter views and stats logic ...
    function renderStats() {
      const totalJobs = allData.reduce((s, d) => s + (d.jobs || 0), 0);
      document.getElementById("occCount").textContent = `${allData.length} occupations \u00b7 ${(totalJobs / 1e6).toFixed(0)}M jobs (EU)`;

      let wSum = 0, wCount = 0;
      const hist = new Array(11).fill(0);
      allData.forEach(d => {
        if (d.exposure != null && d.jobs) {
          wSum += d.exposure * d.jobs; wCount += d.jobs;
          hist[d.exposure] += d.jobs;
        }
      });
      const weightedAvg = wCount > 0 ? wSum / wCount : 0;
      document.getElementById("statAvgExposure").innerHTML = `<span style="color:${exposureColorCSS(weightedAvg, 1)}">${weightedAvg.toFixed(1)}</span>`;

      const maxH = Math.max(...hist);
      document.getElementById("histogram").innerHTML = hist.map((c, i) => {
        const h = (c / maxH * 100);
        return `<div class="bar" style="height:${h}%;background:${exposureColorCSS(i, 0.7)}"></div>`;
      }).join("");

      const eduGroups = [
        { label: "HS / None", m: ["No formal educational credential", "High school diploma"] },
        { label: "Degree / Assoc", m: ["Associate's degree", "Bachelor's degree"] },
        { label: "Masters / Doc", m: ["Master's degree", "Doctoral or professional degree"] }
      ];
      document.getElementById("eduChart").innerHTML = eduGroups.map(g => {
        let s = 0, c = 0;
        allData.forEach(d => { if (g.m.includes(d.education)) { s += d.exposure * d.jobs; c += d.jobs; } });
        const avg = c > 0 ? s / c : 0;
        return `<div class="hbar-row"><span class="hbar-label">${g.label}</span><div class="hbar-track"><div class="hbar-fill" style="width:${avg * 10}%;background:${exposureColorCSS(avg, 0.8)}"></div></div><span class="hbar-val">${avg.toFixed(1)}</span></div>`;
      }).join("");
    }

    function showTooltip(d, mx, my) {
      const tt = document.getElementById("tooltip");
      tt.querySelector(".tt-cat").textContent = d.category;
      tt.querySelector(".tt-title").textContent = d.title;
      tt.querySelector(".tt-pay").textContent = "\u20ac" + d.pay.toLocaleString();
      tt.querySelector(".tt-jobs").textContent = (d.jobs / 1000).toFixed(0) + "K";
      tt.querySelector(".tt-exp").innerHTML = `<span style="color:${exposureColorCSS(d.exposure, 1)}">${d.exposure}/10</span>`;
      tt.querySelector(".tt-out").textContent = d.outlook + "%";
      tt.querySelector(".tt-rationale").textContent = d.exposure_rationale;

      let tx = mx + 20, ty = my - 100;
      if (tx + 360 > window.innerWidth) tx = mx - 360;
      if (ty < 20) ty = 20;
      tt.style.left = tx + "px"; tt.style.top = ty + "px";
      tt.classList.add("visible");
    }

    function hitTest(mx, my) {
      const cx = mx - 260, cy = my;
      for (let i = rects.length - 1; i >= 0; i--) {
        const r = rects[i];
        if (cx >= r.rx && cx < r.rx + r.rw && cy >= r.ry && cy < r.ry + r.rh) return r;
      }
      return null;
    }

    canvas.addEventListener("mousemove", e => {
      const hit = hitTest(e.clientX, e.clientY);
      if (hit !== hovered) { hovered = hit; draw(); }
      if (hovered) { showTooltip(hovered, e.clientX, e.clientY); canvas.style.cursor = "pointer"; }
      else { document.getElementById("tooltip").classList.remove("visible"); canvas.style.cursor = "default"; }
    });

    function resize() {
      dpr = window.devicePixelRatio || 1;
      layout(); draw(); renderStats();
    }

    window.addEventListener("resize", resize);
    fetch("data.json").then(r => r.json()).then(d => { allData = d; resize(); });
  </script>
</body>

</html>
